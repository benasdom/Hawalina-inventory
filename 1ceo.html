<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create CEO Account - Hawalina Ventures</title>
    <link rel="stylesheet" href="auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">✦</div>
                <h1>Hawalina Ventures</h1>
                <p>CEO / Admin Portal</p>
                <small style="color:#ef4444;font-size:0.85rem;">🔒 Restricted Access</small>
            </div>

            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@hawalina.com" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>

                <div id="errorMessage" class="error-message" style="display:none;"></div>
                <div id="successMessage" class="success-message" style="display:none;"></div>

                <button type="submit" class="auth-button" id="signupBtn">
                    <span id="btnText">Create CEO Account</span>
                    <span id="btnLoader" class="loader" style="display:none;"></span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="admin-login.html">Already have an account? Login</a>
                &nbsp;·&nbsp;
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { createCEOAccount } from './auth.js';

        const form = document.getElementById('signupForm');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const signupBtn = document.getElementById('signupBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!email || !password || !confirmPassword) {
                showError('Please fill in all fields.');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match.');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters.');
                return;
            }

            setLoading(true);

            try {
                const result = await createCEOAccount(email, password);

                if (result.success) {
                    showSuccess('Account created! Redirecting...');
                    setTimeout(() => {
                        window.location.href = 'sec92kx.html';
                    }, 1500);
                } else {
                    showError(result.error || 'Account creation failed. Please try again.');
                    setLoading(false);
                }
            } catch (error) {
                console.error('Signup error:', error);
                showError('An unexpected error occurred.');
                setLoading(false);
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.style.display = 'block';
        }

        function setLoading(isLoading) {
            signupBtn.disabled = isLoading;
            btnText.style.display = isLoading ? 'none' : 'inline';
            btnLoader.style.display = isLoading ? 'inline-block' : 'none';
        }
    </script>

    <style>
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</body>
</html>
